version: "3.9"

# Personal mode — only PostgreSQL is needed.
# Redis is in-memory, apps run with: pnpm dev
# To start the database: docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: cyberlab-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cyberlab}
      POSTGRES_USER: ${POSTGRES_USER:-cyberlab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpass123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cyberlab} -d ${POSTGRES_DB:-cyberlab}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
    name: cyberlab_postgres_data
